{% extends 'base.html' %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center;">
<div style="width:100%; max-width:420px;">

    <!-- Logo / branding — mirrors LoginScreen header -->
    <div style="text-align:center; margin-bottom:2rem;">
        <div style="font-size:2.8rem; font-weight:800; color:var(--primary); letter-spacing:1px;">SmartSlot</div>
        <div style="color:var(--muted); font-size:1rem; margin-top:4px;">Resource Booking System</div>
    </div>

    <!-- Card form — mirrors LoginScreen card container -->
    <div class="card" style="padding:2rem;">

        <div style="font-size:1.4rem; font-weight:700; color:var(--text); margin-bottom:4px;">Sign In</div>
        <div style="color:var(--muted-dim); font-size:0.95rem; margin-bottom:1.75rem;">Welcome back</div>

        {% if form.errors %}
        <div class="alert alert-error" style="margin-bottom:1.25rem;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Invalid username or password.</span>
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {% if next %}<input type="hidden" name="next" value="{{ next }}" />{% endif %}

            <div class="form-group" style="margin-bottom:1.1rem;">
                <label class="form-label">
                    <i class="fa-regular fa-user" style="margin-right:6px;"></i>Username
                </label>
                <input type="text" name="username" autofocus autocomplete="username"
                       class="form-input" placeholder="Enter your username" />
            </div>

            <div class="form-group" style="margin-bottom:1.75rem;">
                <label class="form-label">
                    <i class="fa-solid fa-lock" style="margin-right:6px;"></i>Password
                </label>
                <div style="position:relative;">
                    <input type="password" name="password" id="id_password"
                           autocomplete="current-password"
                           class="form-input" placeholder="Enter your password"
                           style="padding-right:44px;" />
                    <button type="button" onclick="togglePwd()"
                        style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                               background:none; border:none; color:var(--muted-dim); cursor:pointer; font-size:0.95rem;">
                        <i class="fa-regular fa-eye" id="pwd-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; padding:13px; font-size:1rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>
    </div>

    <p style="text-align:center; color:var(--muted); font-size:0.95rem; margin-top:1.25rem;">
        Don't have an account?
        <a href="{% url 'signup' %}" style="color:var(--primary); font-weight:600; text-decoration:none;">
            Create one
        </a>
    </p>

</div>
</div>

<script>
function togglePwd() {
    const inp = document.getElementById('id_password');
    const icon = document.getElementById('pwd-icon');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'fa-regular fa-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'fa-regular fa-eye';
    }
}
</script>
{% endblock %}
